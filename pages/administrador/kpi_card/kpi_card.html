<div class="kpi-grid-2x2">

  <article class="kpi-card">
    <div class="kpi-header">
      <span class="kpi-label">Total Productos</span>
      <div class="kpi-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
      </div>
    </div>
    <p class="kpi-value" id="dash-total">—</p>
    <p class="kpi-change">Registrados en el sistema</p>
    <div class="mini-spark" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  </article>

  <article class="kpi-card">
    <div class="kpi-header">
      <span class="kpi-label">Alertas de Stock</span>
      <div class="kpi-icon kpi-icon--red">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
    </div>
    <p class="kpi-value kpi-value--red" id="dash-alertas">—</p>
    <p class="kpi-change">Bajo stock mínimo</p>
    <div class="mini-spark mini-spark--alert" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  </article>

  <article class="kpi-card">
    <div class="kpi-header">
      <span class="kpi-label">Por Vencer (30d)</span>
      <div class="kpi-icon kpi-icon--amber">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
    </div>
    <p class="kpi-value kpi-value--amber" id="dash-vencimiento">—</p>
    <p class="kpi-change">Lotes próximos a vencer</p>
    <div class="mini-spark mini-spark--muted" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  </article>

  <article class="kpi-card">
    <div class="kpi-header">
      <span class="kpi-label">Valor de Inventario</span>
      <div class="kpi-icon kpi-icon--green">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
    </div>
    <p class="kpi-value kpi-value--green" id="dash-valor">—</p>
    <p class="kpi-change">Valor total en stock (S/)</p>
    <div class="mini-spark mini-spark--value" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  </article>

</div>
