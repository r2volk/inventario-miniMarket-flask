<article class="card form-card" id="widget-registrar-salida">
  <div class="card-header">
    <div>
      <span class="section-eyebrow">Egreso</span>
      <h3 class="card-title">Registrar Salida</h3>
      <p class="card-subtitle">Egreso de productos por venta o consumo interno.</p>
    </div>
  </div>
  <div class="card-body form-grid">
    <div class="row row--full">
      <label>Producto *</label>
      <select id="s-product">
        <option value="">Cargando productos...</option>
      </select>
    </div>
    <div class="row">
      <label>Cantidad *</label>
      <input id="s-cant" type="number" value="1" min="1">
    </div>
    <div class="row">
      <label>Vendedor</label>
      <input id="s-user" value="Cajero 1">
    </div>
    <div class="row row--full">
      <label>Motivo</label>
      <select id="s-mot">
        <option value="Venta al público">Venta al público</option>
        <option value="Consumo interno">Consumo interno</option>
        <option value="Merma/Vencido">Merma / Vencido</option>
        <option value="Devolución">Devolución a Proveedor</option>
      </select>
    </div>
  </div>
  <div class="card-actions">
    <button id="s-save" class="btn btn-dark btn-danger">Confirmar salida</button>
  </div>
</article>
