<article class="card form-card" id="widget-registrar-entrada">
  <div class="card-header">
    <div>
      <span class="section-eyebrow">Ingreso</span>
      <h3 class="card-title">Registrar Entrada</h3>
      <p class="card-subtitle">Ingreso de mercadería al stock del almacén.</p>
    </div>
  </div>
  <div class="card-body form-grid">
    <div class="row row--full">
      <label>Producto *</label>
      <select id="e-product">
        <option value="">Cargando productos...</option>
      </select>
    </div>
    <div class="row row--full">
      <label>Proveedor *</label>
      <select id="e-provider">
        <option value="">Cargando proveedores...</option>
      </select>
    </div>
    <div class="row">
      <label>Cantidad *</label>
      <input id="e-cant" type="number" value="1" min="1">
    </div>
    <div class="row">
      <label>Vencimiento</label>
      <input id="e-venc" type="date">
    </div>
    <div class="row">
      <label>Responsable</label>
      <input id="e-user" value="Almacenero">
    </div>
    <div class="row">
      <label>Motivo</label>
      <input id="e-mot" value="Reposición de Stock">
    </div>
  </div>
  <div class="card-actions">
    <button id="e-save" class="btn btn-dark">Confirmar ingreso</button>
  </div>
</article>
