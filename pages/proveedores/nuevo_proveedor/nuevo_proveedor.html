<article class="card form-card" id="widget-nuevo-proveedor">
  <div class="card-header">
    <div>
      <span class="section-eyebrow">Catálogo</span>
      <h3 class="card-title">Nuevo Proveedor</h3>
      <p class="card-subtitle">Registra los datos del proveedor para futuras entradas de stock.</p>
    </div>
  </div>
  <div class="card-body form-grid">
    <div class="row">
      <label>RUC / DNI *</label>
      <input id="pr-ruc" placeholder="20601234567">
    </div>
    <div class="row">
      <label>Razón Social *</label>
      <input id="pr-nombre" placeholder="Empresa S.A.C.">
    </div>
    <div class="row">
      <label>Teléfono</label>
      <input id="pr-tel" placeholder="01-234-5678">
    </div>
    <div class="row row--full">
      <label>Dirección</label>
      <input id="pr-dir" placeholder="Av. Principal 123">
    </div>
  </div>
  <div class="card-actions">
    <button id="pr-save" class="btn btn-dark">Guardar proveedor</button>
  </div>
</article>
