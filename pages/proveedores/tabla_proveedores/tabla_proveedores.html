<article class="card table-card">
  <div class="card-header">
    <div>
      <h3 class="card-title">Proveedores Registrados</h3>
      <p class="card-subtitle">{{ proveedores|length }} proveedores en el sistema</p>
    </div>
  </div>
  <div class="table-wrap">
    <table class="table" id="proveedores-table">
      <thead>
        <tr>
          <th>RUC / DNI</th>
          <th>Razón Social</th>
          <th>Teléfono</th>
          <th>Dirección</th>
          <th class="th-actions">Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% for p in proveedores %}
        <tr data-id="{{ p['id'] }}">
          <td><code class="code-cell">{{ p['ruc'] }}</code></td>
          <td class="td-name">{{ p['nombre'] }}</td>
          <td>{{ p['telefono'] or '—' }}</td>
          <td class="td-desc">{{ p['direccion'] or '—' }}</td>
          <td class="td-actions">
            <button class="btn-icon btn-edit" data-id="{{ p['id'] }}" title="Editar proveedor">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn-icon btn-delete" data-id="{{ p['id'] }}" title="Eliminar proveedor">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="pagination" id="proveedores-pagination" style="display:none">
    <button class="page-btn" id="page-prev" disabled>Anterior</button>
    <div class="page-buttons" id="page-buttons"></div>
    <button class="page-btn" id="page-next" disabled>Siguiente</button>
  </div>
</article>
