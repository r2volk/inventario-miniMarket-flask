<article class="card form-card" id="widget-nuevo-producto">
  <div class="card-header">
    <div>
      <span class="section-eyebrow">Catálogo</span>
      <h3 class="card-title">Nuevo Producto</h3>
      <p class="card-subtitle">Completa los datos para registrar un producto al inventario.</p>
    </div>
  </div>
  <div class="card-body form-grid">
    <div class="row">
      <label>Código *</label>
      <input id="p-codigo" placeholder="Ej: ARR001" required maxlength="20">
    </div>
    <div class="row">
      <label>Nombre *</label>
      <input id="p-nombre" placeholder="Ej: Arroz Extra" required maxlength="100">
    </div>
    <div class="row row--full">
      <label>Categoría</label>
      <div class="row-combo">
        <select id="p-cat"></select>
        <button id="btn-add-cat" class="btn btn-ghost" type="button" title="Nueva categoría">+</button>
      </div>
    </div>
    <div class="row">
      <label>P. Compra (S/)</label>
      <input id="p-pcompra" type="number" min="0" step="0.10" value="0.00">
    </div>
    <div class="row">
      <label>P. Venta (S/)</label>
      <input id="p-pventa" type="number" min="0" step="0.10" value="0.00">
    </div>
    <div class="row">
      <label>Stock mínimo</label>
      <input id="p-stockmin" type="number" min="0" value="5">
    </div>
    <div class="row row--full">
      <label>Descripción</label>
      <input id="p-desc" placeholder="Opcional" maxlength="255">
    </div>
  </div>
  <div class="card-actions">
    <button id="p-save" class="btn btn-dark">Guardar producto</button>
    <button id="p-cancel-edit" class="btn btn-ghost" style="display:none">Cancelar</button>
  </div>
</article>
