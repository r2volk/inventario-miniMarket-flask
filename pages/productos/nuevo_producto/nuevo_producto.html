<article class="card form-card" id="widget-nuevo-producto">
  <div class="card-header">
    <div>
      <span class="section-eyebrow">Catálogo</span>
      <h3 class="card-title">Nuevo Producto</h3>
      <p class="card-subtitle">Completa los datos para registrar un producto al inventario.</p>
    </div>
  </div>
  <div class="card-body form-grid">
    <div class="row">
      <label>Código *</label>
      <input id="p-codigo" placeholder="Ej: ARR001">
    </div>
    <div class="row">
      <label>Nombre *</label>
      <input id="p-nombre" placeholder="Ej: Arroz Extra">
    </div>
    <div class="row row--full">
      <label>Categoría</label>
      <select id="p-cat">
        <option value="Frutas y Verduras">Frutas y Verduras</option>
        <option value="Carnes">Carnes</option>
        <option value="Panadería">Panadería</option>
        <option value="Congelados">Congelados</option>
        <option value="Enlatados">Enlatados</option>
        <option value="Granos y Cereales">Granos y Cereales</option>
        <option value="Pastas">Pastas</option>
        <option value="Aceites">Aceites</option>
        <option value="Condimentos">Condimentos</option>
        <option value="Botanas">Botanas</option>
        <option value="Café">Café</option>
        <option value="Té">Té</option>
        <option value="Jugos">Jugos</option>
        <option value="Agua">Agua</option>
        <option value="Bebidas Energéticas">Bebidas Energéticas</option>
        <option value="Cuidado Personal">Cuidado Personal</option>
        <option value="Higiene Personal">Higiene Personal</option>
        <option value="Productos para Bebé">Productos para Bebé</option>
        <option value="Mascotas">Mascotas</option>
        <option value="Papel y Desechables">Papel y Desechables</option>
        <option value="Utensilios de Cocina">Utensilios de Cocina</option>
        <option value="Papelería">Papelería</option>
        <option value="Ferretería">Ferretería</option>
        <option value="Ropa">Ropa</option>
        <option value="Comida Preparada">Comida Preparada</option>
      </select>
    </div>
    <div class="row">
      <label>P. Compra (S/)</label>
      <input id="p-pcompra" type="number" min="0" step="0.10" value="0.00">
    </div>
    <div class="row">
      <label>P. Venta (S/)</label>
      <input id="p-pventa" type="number" min="0" step="0.10" value="0.00">
    </div>
    <div class="row">
      <label>Stock mínimo</label>
      <input id="p-stockmin" type="number" min="0" value="5">
    </div>
    <div class="row row--full">
      <label>Descripción</label>
      <input id="p-desc" placeholder="Opcional">
    </div>
  </div>
  <div class="card-actions">
    <button id="p-save" class="btn btn-dark">Guardar producto</button>
  </div>
</article>
